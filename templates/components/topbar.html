<script>
(function(){
document.addEventListener("DOMContentLoaded",()=>{

// ===============================
// SAFE HELPERS
// ===============================
function safeAlert(msg,type="info"){
    if(window.showAlert) window.showAlert(msg,type);
}

function safeTerminal(msg,type="info"){
    if(window.printToTerminal) window.printToTerminal(msg,type);
}

// ===============================
// FILE MENU ACTIONS
// ===============================
async function handleSave(){

    if(!window.editorInstance || !window.activeTab){
        safeAlert("Koi file open nahi hai!","error");
        return;
    }

    const code = window.editorInstance.getValue();
    const filename = window.activeTab;

    safeTerminal(`Saving ${filename}...`,"system");

    if(window.AsoomAPI?.saveFile){
        const result = await window.AsoomAPI.saveFile(filename,code);

        if(result.status==="success"){
            safeAlert("File Saved ✔","success");
            safeTerminal("Save successful","success");
        }else{
            safeAlert("Save failed","error");
            safeTerminal(result.message || "Save error","error");
        }
    }
}

// ===============================
// RUN ENGINE
// ===============================
async function handleRun(){

    if(!window.editorInstance){
        safeAlert("Editor load nahi hua!","error");
        return;
    }

    const code = window.editorInstance.getValue();
    safeTerminal("Running project...","system");

    const loader = document.getElementById("pv-loader");
    loader?.classList.remove("hidden");
    loader?.classList.add("flex");

    if(window.AsoomAPI?.runProject){

        const result = await window.AsoomAPI.runProject(code);

        loader?.classList.add("hidden");
        loader?.classList.remove("flex");

        if(result.status==="success"){
            if(window.renderLiveWeb)
                window.renderLiveWeb(result.output_html);

            safeTerminal(result.terminal_log,"success");
        }else{
            safeAlert("Build Failed","error");
            safeTerminal(result.terminal_log,"error");
        }
    }
}

// ===============================
// ACTION ROUTER
// ===============================
document.querySelectorAll(".tb-action").forEach(btn=>{
    btn.addEventListener("click",(e)=>{
        e.stopPropagation();
        const action = btn.getAttribute("data-action");

        switch(action){

            case "Nayi File":
                window.promptNewFile?.("file");
                break;

            case "Naya Folder":
                window.promptNewFile?.("folder");
                break;

            case "Save":
                handleSave();
                break;

            case "Undo":
                window.editorInstance?.trigger("keyboard","undo");
                break;

            case "Copy":
                document.execCommand("copy");
                break;

            case "Naya Terminal":
                window.toggleTerminal?.();
                break;

            case "Code Theek Karo":
                safeAlert("AI module coming soon 🤖","info");
                break;

            default:
                safeAlert(action+" (Coming Soon)");
        }
    });
});

// ===============================
// RUN BUTTON
// ===============================
document.getElementById("tb-run-btn")
?.addEventListener("click",handleRun);

// ===============================
// KEYBOARD SHORTCUTS
// ===============================
document.addEventListener("keydown",(e)=>{

    // Ctrl + S
    if(e.ctrlKey && e.key==="s"){
        e.preventDefault();
        handleSave();
    }

    // Ctrl + N
    if(e.ctrlKey && e.key==="n"){
        e.preventDefault();
        window.promptNewFile?.("file");
    }

    // Ctrl + Enter → Run
    if(e.ctrlKey && e.key==="Enter"){
        e.preventDefault();
        handleRun();
    }

});

// ===============================
// LAYOUT TOGGLES
// ===============================
document.getElementById("tb-toggle-sidebar")
?.addEventListener("click",()=>window.toggleSidebar?.());

document.getElementById("tb-toggle-bottom")
?.addEventListener("click",()=>window.toggleTerminal?.());

document.getElementById("tb-toggle-right")
?.addEventListener("click",()=>window.togglePreview?.());

});
})();
</script>
