<div id="preview-panel" class="w-1/3 bg-[#1e1e1e] flex flex-col shrink-0 min-w-[300px] border-l border-[#333] relative">
    
    <div class="bg-[#f3f3f3] h-9 flex items-center px-3 border-b border-gray-300 select-none shrink-0 justify-between">
        
        <div id="pv-close-btn" class="flex gap-1.5 group cursor-pointer" title="Close Preview">
            <div class="w-3 h-3 rounded-full bg-[#ff5f56] flex items-center justify-center text-[8px] text-red-900 opacity-80 group-hover:opacity-100 transition">
                <i class="fa-solid fa-xmark hidden group-hover:block"></i>
            </div>
            <div class="w-3 h-3 rounded-full bg-[#ffbd2e] opacity-80 hover:opacity-100 transition"></div>
            <div class="w-3 h-3 rounded-full bg-[#27c93f] opacity-80 hover:opacity-100 transition"></div>
        </div>
        
        <div class="bg-white border border-gray-300 rounded-md px-3 py-1 text-[11px] text-gray-500 flex-1 mx-4 flex items-center justify-center gap-2 shadow-sm">
            <i class="fa-solid fa-lock text-green-600 text-[10px]"></i> 
            <span id="pv-url-bar">localhost:5000/live-preview</span>
        </div>
        
        <div class="flex gap-2 text-gray-500">
            <i id="pv-refresh-btn" class="fa-solid fa-rotate-right text-[13px] hover:text-[#007acc] cursor-pointer transition p-1" title="Reload Preview"></i>
        </div>
    </div>
    
    <div class="flex-1 w-full bg-white relative overflow-hidden">
        
        <div id="pv-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 bg-gray-50 select-none transition-opacity duration-300">
            <i class="fa-brands fa-chrome text-5xl mb-3 text-gray-300 drop-shadow-sm"></i>
            <span class="text-[14px] font-semibold text-gray-500">Live Web Preview</span>
            <span class="text-[12px] mt-1">"Chalao" par click karein</span>
        </div>

        <div id="pv-loader" class="absolute inset-0 hidden flex-col items-center justify-center bg-white z-10">
            <i class="fa-solid fa-circle-notch fa-spin text-3xl text-[#007acc] mb-3"></i>
            <span class="text-[12px] font-semibold text-gray-500 tracking-wider animate-pulse">RENDERING PROJECT...</span>
        </div>
        
        <iframe id="pv-iframe" class="w-full h-full border-none hidden bg-white" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
</div>

<script>
    (function() {
        // Internal State
        let lastInjectedCode = "";

        document.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.getElementById('pv-close-btn');
            const refreshBtn = document.getElementById('pv-refresh-btn');
            const iframe = document.getElementById('pv-iframe');
            const placeholder = document.getElementById('pv-placeholder');
            const loader = document.getElementById('pv-loader');
            const urlBar = document.getElementById('pv-url-bar');

            // 1. Close Window Action
            if(closeBtn) {
                closeBtn.addEventListener('click', () => {
                    if (typeof window.togglePreview === 'function') window.togglePreview();
                });
            }

            // 2. CONSOLE INTERCEPTOR SCRIPT (The Magic Sauce)
            // Yeh script hum iframe ke andar chipkayenge taaki wahan ka console.log humare bahar wale terminal mein aaye.
            const consoleInterceptor = `
                <script>
                    (function() {
                        const originalLog = console.log;
                        const originalError = console.error;
                        const originalWarn = console.warn;

                        console.log = function(...args) {
                            window.parent.postMessage({ type: 'iframe_console', level: 'info', msg: args.join(' ') }, '*');
                            originalLog.apply(console, args);
                        };
                        console.error = function(...args) {
                            window.parent.postMessage({ type: 'iframe_console', level: 'error', msg: args.join(' ') }, '*');
                            originalError.apply(console, args);
                        };
                        console.warn = function(...args) {
                            window.parent.postMessage({ type: 'iframe_console', level: 'warning', msg: args.join(' ') }, '*');
                            originalWarn.apply(console, args);
                        };
                        
                        // Catch global errors (syntax errors inside iframe)
                        window.onerror = function(message, source, lineno, colno, error) {
                            window.parent.postMessage({ type: 'iframe_console', level: 'error', msg: message + ' at line ' + lineno }, '*');
                            return false;
                        };
                    })();
                <\/script>
            `;

            // 3. Global Render Function (Backend Engine calls this)
            window.renderLiveWeb = function(htmlCode) {
                lastInjectedCode = htmlCode;
                
                // Address Bar Update dynamically (optional visual flair)
                if(window.activeTab) urlBar.innerText = `localhost:5000/live/${window.activeTab}`;
                
                // Hide Placeholder, Show Loader
                placeholder.classList.add('hidden');
                iframe.classList.add('hidden');
                loader.classList.remove('hidden');
                loader.classList.add('flex');

                // Smooth UI Transition (200ms)
                setTimeout(() => {
                    loader.classList.add('hidden');
                    loader.classList.remove('flex');
                    iframe.classList.remove('hidden');
                    
                    // Injecting our Console Catcher + Real HTML Code
                    iframe.srcdoc = consoleInterceptor + htmlCode;
                }, 200);
            };

            // 4. Listen for messages from the iframe (Connect to Terminal)
            window.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'iframe_console') {
                    if (typeof window.printToTerminal === 'function') {
                        // Browser wale log ko "system" ya alag style me print karna
                        let terminalLevel = "info";
                        if(event.data.level === 'error') terminalLevel = "error";
                        if(event.data.level === 'warning') terminalLevel = "warning";
                        if(event.data.level === 'info') terminalLevel = "success"; // Info ko green dikhate hain
                        
                        window.printToTerminal(`[Browser] ${event.data.msg}`, terminalLevel);
                    }
                }
            });

            // 5. Refresh Action
            if(refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    refreshBtn.classList.add('fa-spin');
                    setTimeout(() => refreshBtn.classList.remove('fa-spin'), 500);

                    if(lastInjectedCode) {
                        window.renderLiveWeb(lastInjectedCode);
                        if (typeof window.printToTerminal === 'function') {
                            window.printToTerminal("Preview panel reloaded.", "system");
                        }
                    }
                });
            }
        });
    })();
</script>
